<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday My Roro</title>

<style>
html, body{
margin:0;
height:100%;
overflow:hidden;
background:#170016;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#count{
font-size:25vw;
color:#ff7ac3;
text-shadow:
0 0 20px #ff3da3,
0 0 50px #ff0088;
opacity:0;
transition:.4s;
}

#heart{
font-size:20vw;
opacity:0;
transform:scale(.3);
transition:1s;
}

#message{
opacity:0;
font-size:8vw;
text-align:center;
padding:20px;
color:#ffe4f5;
text-shadow:
0 0 15px #ff6fb6,
0 0 40px #ff0080;
transition:1s;
}

.show{
opacity:1 !important;
}

.grow{
transform:scale(1.3);
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="count"></div>

<div id="heart">💖</div>

<div id="message">
Happy Birthday<br>
My Roro 🎂✨
</div>

<script>

const count=document.getElementById("count");
const heart=document.getElementById("heart");
const msg=document.getElementById("message");

let nums=["3","2","1"];

async function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function play(){

for(let n of nums){

count.textContent=n;

count.classList.add("show");

await wait(900);

count.classList.remove("show");

await wait(300);

}

heart.classList.add("show");

await wait(300);

heart.classList.add("grow");

await wait(1700);

heart.style.opacity="0";

await wait(600);

msg.classList.add("show");

}

play();

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();

window.addEventListener("resize",resize);

let stars=[];

for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*3
});
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let s of stars){

ctx.fillStyle="#ff66bb";

ctx.beginPath();

ctx.arc(s.x,s.y,s.s,0,6.28);

ctx.fill();

s.y+=0.3;

if(s.y>canvas.height){
s.y=0;
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
